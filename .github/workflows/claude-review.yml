name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for the robloxstudio-mcp project. Focus on:
            - Code quality and correctness
            - Potential bugs or edge cases
            - Whether changes are consistent with existing patterns (6-file tool pattern: definitions, tools/index, server, http-server, Communication, plugin handler)
            - Security concerns (no exposed secrets, safe property handling)
            - Whether the PR description accurately reflects the changes
