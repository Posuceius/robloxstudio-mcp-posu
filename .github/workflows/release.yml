name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install studio-plugin dependencies
        run: cd studio-plugin && npm install

      - name: Build packages
        run: npm run build

      - name: Build plugin
        run: npm run build:plugin

      - name: Upload plugin to release
        uses: softprops/action-gh-release@v2
        with:
          files: studio-plugin/MCPPlugin.rbxmx
